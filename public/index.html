<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Geminia Life Insurance — Premium Display</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #020804;
    --panel: #040e08;
    --border: #0d2818;
    --border-hi: #1a4d2e;
    --green: #00e676;
    --green-dim: #00a152;
    --red: #ff1744;
    --amber: #ffab00;
    --white: #e8f5e9;
    --muted: #4a7c59;
    --mono: 'IBM Plex Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
    --sans: 'Inter', system-ui, sans-serif;
    --ticker-h: 42px;
    --header-h: 56px;
    --footer-h: 36px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: var(--sans);
    color: var(--white);
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    z-index: 100;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 24px;
    background: linear-gradient(180deg, #061a0e 0%, #020804 100%);
    border-bottom: 2px solid var(--border-hi);
    box-shadow: 0 4px 24px rgba(0,230,118,0.08);
  }
  .tb-left { display: flex; align-items: center; gap: 16px; }
  .tb-logo {
    font-family: var(--display);
    font-size: clamp(22px, 2.5vw, 30px);
    letter-spacing: 0.06em;
    color: var(--green);
    text-shadow: 0 0 20px rgba(0,230,118,0.5);
    line-height: 1;
  }
  .tb-logo span { color: var(--white); }
  .tb-tag {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid var(--border-hi);
    border-radius: 2px;
  }
  .tb-center {
    font-family: var(--display);
    font-size: 18px;
    letter-spacing: 0.2em;
    color: var(--amber);
    text-align: center;
  }
  .tb-right {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 20px;
  }
  .live-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--green);
    text-transform: uppercase;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green), 0 0 16px var(--green);
    animation: blink 1.5s ease infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  #clock {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--white);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
  }

  /* ── TICKER ── */
  #ticker-wrap {
    position: fixed;
    bottom: var(--footer-h);
    left: 0; right: 0;
    height: var(--ticker-h);
    z-index: 100;
    background: #010a04;
    border-top: 2px solid var(--green-dim);
    border-bottom: 1px solid var(--border-hi);
    overflow: hidden;
    display: flex;
    align-items: center;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #ticker-wrap.visible { opacity: 1; }
  .ticker-label {
    flex-shrink: 0;
    background: var(--green-dim);
    color: #000;
    font-family: var(--display);
    font-size: 16px;
    letter-spacing: 0.12em;
    padding: 0 16px;
    height: 100%;
    display: flex;
    align-items: center;
    z-index: 2;
  }
  #ticker-track {
    display: flex;
    white-space: nowrap;
    animation: ticker 40s linear infinite;
  }
  #ticker-track:hover { animation-play-state: paused; }
  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .tick-item {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 0 28px;
    font-family: var(--mono);
    font-size: 13px;
    border-right: 1px solid var(--border);
  }
  .tick-sym { color: var(--amber); font-weight: 700; }
  .tick-val { color: var(--white); font-weight: 600; font-size: clamp(11px, 1vw, 13px); }
  .tick-chg.up { color: var(--green); }
  .tick-chg.down { color: var(--red); }

  /* ── FOOTER BAR ── */
  #footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--footer-h);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    background: #010a04;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.5s;
  }
  #footer.visible { opacity: 1; }
  #slide-label { color: var(--amber); font-weight: 600; letter-spacing: 0.08em; }
  #counter { color: var(--muted); }
  #dots { display: flex; gap: 5px; }
  .dot {
    width: 5px; height: 5px;
    background: var(--border-hi);
    border-radius: 1px;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .dot.active {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  /* ── STAGE ── */
  #stage {
    position: fixed;
    top: var(--header-h);
    left: 0; right: 0;
    bottom: calc(var(--ticker-h) + var(--footer-h));
    z-index: 1;
  }
  #stage img, #stage video {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 1s ease;
  }
  #stage img.active, #stage video.active { opacity: 1; }

  /* Progress */
  #progress-wrap {
    position: fixed;
    top: var(--header-h);
    left: 0; right: 0;
    height: 2px;
    z-index: 101;
    background: var(--border);
    opacity: 0;
    transition: opacity 0.3s;
  }
  #progress-wrap.visible { opacity: 1; }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    transition: width 0.1s linear;
  }

  /* Empty */
  #empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    text-align: center;
    padding: 40px;
    background: var(--bg);
  }
  .empty-logo {
    font-family: var(--display);
    font-size: clamp(36px, 5vw, 64px);
    letter-spacing: 0.08em;
    color: var(--green);
    text-shadow: 0 0 40px rgba(0,230,118,0.4);
    line-height: 1.1;
  }
  .empty-logo span { display: block; font-size: 0.55em; color: var(--white); letter-spacing: 0.25em; }
  .empty-board {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 12px 24px;
    border: 1px solid var(--border-hi);
  }
  .empty-sub { font-size: 14px; color: var(--muted); max-width: 400px; line-height: 1.7; }
  .empty-link {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--green);
    text-decoration: none;
    padding: 10px 20px;
    border: 1px solid var(--green-dim);
    text-transform: uppercase;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .empty-link:hover {
    background: rgba(0,230,118,0.08);
    box-shadow: 0 0 16px rgba(0,230,118,0.2);
  }

  #fullscreen-hint {
    position: fixed;
    top: calc(var(--header-h) + 12px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding: 6px 14px;
    border: 1px solid var(--border-hi);
    background: rgba(2,8,4,0.9);
    text-transform: uppercase;
    transition: opacity 0.6s;
    pointer-events: none;
  }
  #fullscreen-hint.hidden { opacity: 0; }
</style>
<link rel="stylesheet" href="revenue.css" />
</head>
<body>

  <div id="topbar">
    <div class="tb-left">
      <div class="tb-logo">GEMINIA <span>LIFE</span></div>
      <div class="tb-tag">Insurance</div>
    </div>
    <div class="tb-center">◆ LIVE PREMIUM DASHBOARD ◆</div>
    <div class="tb-right">
      <div class="live-status">
        <div class="status-dot"></div>
        LIVE
      </div>
      <div id="clock"></div>
    </div>
  </div>

  <div id="progress-wrap"><div id="progress-bar"></div></div>

  <div id="stage">
    <div id="empty">
      <div class="empty-logo">GEMINIA<span>LIFE INSURANCE</span></div>
      <div class="empty-board">◆ Geminia Life Insurance — Loading Premium Data ◆</div>
      <div class="empty-sub">Live premium figures from Oracle ERP. Dashboard initializing...</div>
      <a class="empty-link" href="/admin.html">→ Admin Panel</a>
    </div>
  </div>

  <div id="ticker-wrap">
    <div class="ticker-label">LIVE PREMIUMS</div>
    <div id="ticker-track"></div>
  </div>

  <div id="footer">
    <div id="slide-label">PREMIUM DASHBOARD</div>
    <div id="dots"></div>
    <div id="counter"></div>
  </div>

  <div id="fullscreen-hint">Click for fullscreen</div>

  <script src="display.js"></script>
</body>
</html>
