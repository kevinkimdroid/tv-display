<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>TV Display</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #050508;
    overflow: hidden;
    font-family: 'DM Sans', system-ui, sans-serif;
  }
  #stage {
    position: relative;
    width: 100vw; height: 100vh;
    background: radial-gradient(ellipse at center, #0d0d14 0%, #050508 70%);
  }
  #stage img, #stage video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    opacity: 0;
    transform: scale(1.04);
    transition: opacity 1s ease-in-out, transform 8s ease-out;
  }
  #stage img.active, #stage video.active {
    opacity: 1;
    transform: scale(1);
  }
  #vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.45) 100%);
  }
  #empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    z-index: 2;
    padding: 40px;
    text-align: center;
  }
  .empty-icon {
    width: 88px; height: 88px;
    border-radius: 24px;
    background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(168,85,247,0.15));
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .empty-title {
    font-size: clamp(22px, 3vw, 36px);
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    letter-spacing: -0.02em;
  }
  .empty-sub {
    font-size: clamp(14px, 1.6vw, 18px);
    color: rgba(255,255,255,0.4);
    max-width: 420px;
    line-height: 1.6;
  }
  .empty-link {
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 12px;
    background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.35);
    color: #a5b4fc;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    transition: background 0.2s, transform 0.2s;
  }
  .empty-link:hover {
    background: rgba(99,102,241,0.25);
    transform: translateY(-1px);
  }
  #hud {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 28px 36px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 100%);
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
  }
  #hud.visible { opacity: 1; }
  #clock {
    color: rgba(255,255,255,0.75);
    font-size: clamp(13px, 1.3vw, 17px);
    font-weight: 500;
    letter-spacing: 0.02em;
    padding: 10px 18px;
    border-radius: 100px;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  #counter {
    color: rgba(255,255,255,0.5);
    font-size: clamp(12px, 1.1vw, 15px);
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 100px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
  }
  #progress-wrap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    z-index: 11;
    background: rgba(255,255,255,0.06);
    opacity: 0;
    transition: opacity 0.4s;
  }
  #progress-wrap.visible { opacity: 1; }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #6366f1, #a855f7);
    transition: width 0.1s linear;
    box-shadow: 0 0 12px rgba(99,102,241,0.6);
  }
  #fullscreen-hint {
    position: absolute;
    top: 28px; left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    padding: 10px 20px;
    border-radius: 100px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    font-weight: 500;
    opacity: 1;
    transition: opacity 0.8s ease;
    pointer-events: none;
  }
  #fullscreen-hint.hidden { opacity: 0; }
</style>
<link rel="stylesheet" href="revenue.css" />
</head>
<body>
  <div id="stage">
    <div id="empty">
      <div class="empty-icon">📺</div>
      <div class="empty-title">Ready for your content</div>
      <div class="empty-sub">Upload photos and videos from the admin panel to start your slideshow.</div>
      <a class="empty-link" href="/admin.html">Open Admin Panel →</a>
    </div>
    <div id="vignette"></div>
  </div>

  <div id="fullscreen-hint">Click anywhere for fullscreen</div>

  <div id="hud">
    <div id="counter"></div>
    <div id="clock"></div>
  </div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>

  <script src="display.js"></script>
</body>
</html>
