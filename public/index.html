<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Geminia Life Insurance — Premium Display</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Geminia Life brand palette */
    --gem-cyan: #00AEEF;
    --gem-cyan-light: #4DC4F5;
    --gem-cyan-glow: rgba(0, 174, 239, 0.35);
    --gem-navy: #004A99;
    --gem-navy-dark: #002B5C;
    --gem-navy-deeper: #001833;
    --gem-white: #FFFFFF;
    --gem-silver: #E6E7E8;
    --gem-muted: #9BB8D4;
    --gem-label: #B8D0E8;

    --bg: #000E1C;
    --panel: #001A33;
    --border: rgba(0, 74, 153, 0.4);
    --border-hi: rgba(0, 174, 239, 0.45);
    --accent: var(--gem-cyan);
    --accent-dim: #0088BB;
    --red: #E53935;
    --font-ui: 'IBM Plex Sans', system-ui, sans-serif;
    --font-money: 'IBM Plex Mono', 'Consolas', monospace;
    --ticker-h: 38px;
    --header-h: 56px;
    --footer-h: 32px;
    /* Stage chrome = chrome above + below the content area (not double-counted) */
    --chrome-below: calc(var(--ticker-h) + var(--footer-h));
    --chrome: calc(var(--header-h) + var(--chrome-below));
  }
  html {
    font-size: clamp(14px, 1.15vmin, 18px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: var(--font-ui);
    color: var(--gem-white);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 80% 60% at 10% -10%, rgba(0,174,239,0.07), transparent 55%),
      radial-gradient(ellipse 70% 50% at 100% 100%, rgba(0,74,153,0.12), transparent 50%);
  }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    z-index: 100;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    background: rgba(0, 24, 51, 0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(0, 174, 239, 0.35);
    box-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
  }
  .tb-left { display: flex; align-items: center; min-width: 0; }
  .tb-brand {
    display: flex;
    align-items: center;
    line-height: 0;
    text-decoration: none;
  }
  .tb-logo-pad {
    background: #ffffff;
    padding: 4px 12px 4px 10px;
    border-radius: 5px;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
    display: flex;
    align-items: center;
  }
  .tb-logo-img {
    height: 34px;
    width: auto;
    max-width: min(260px, 32vw);
    object-fit: contain;
    object-position: left center;
    display: block;
    image-rendering: auto;
  }
  .tb-center {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    font-size: clamp(11px, 1.05vw, 13px);
    font-weight: 600;
    letter-spacing: 0.14em;
    color: var(--gem-label);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .tb-center-line {
    width: 28px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0, 174, 239, 0.45));
  }
  .tb-center-line:last-child {
    background: linear-gradient(90deg, rgba(0, 174, 239, 0.45), transparent);
  }
  .tb-right {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 14px;
  }
  .tb-live-block {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  .data-updated {
    font-size: 9px;
    font-weight: 500;
    font-family: var(--font-money);
    color: var(--gem-muted);
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
  }
  .data-updated.fresh { color: var(--gem-cyan); }
  .live-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--gem-cyan);
    text-transform: uppercase;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gem-cyan);
    box-shadow: 0 0 8px var(--gem-cyan);
    animation: blink 2s ease infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  /* ── TICKER ── */
  #ticker-wrap {
    position: fixed;
    bottom: var(--footer-h);
    left: 0; right: 0;
    height: var(--ticker-h);
    z-index: 100;
    background: rgba(0, 43, 92, 0.9);
    border-top: 1px solid rgba(0, 174, 239, 0.25);
    overflow: hidden;
    display: flex;
    align-items: center;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #ticker-wrap.visible { opacity: 1; }
  .ticker-label {
    flex-shrink: 0;
    background: var(--gem-cyan);
    color: var(--gem-navy-deeper);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 0 16px;
    height: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 2;
  }
  .ticker-mark {
    width: 16px;
    height: 16px;
    object-fit: contain;
    filter: brightness(0) saturate(100%);
    opacity: 0.65;
  }
  #ticker-track {
    display: flex;
    white-space: nowrap;
    animation: ticker 45s linear infinite;
  }
  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .tick-item {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 0 32px;
    font-size: 12px;
    border-right: 1px solid rgba(255, 255, 255, 0.08);
  }
  .tick-sym {
    color: var(--gem-label);
    font-weight: 500;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    min-width: 72px;
  }
  .tick-val {
    color: var(--gem-white);
    font-weight: 600;
    font-family: var(--font-money);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1, "lnum" 1;
    letter-spacing: 0.04em;
  }
  .tick-chg {
    font-family: var(--font-money);
    font-size: 11px;
    font-weight: 600;
  }
  #clock {
    font-size: 12px;
    font-weight: 500;
    font-family: var(--font-money);
    color: var(--gem-label);
    font-variant-numeric: tabular-nums;
  }
  .tick-chg.up { color: var(--gem-cyan); }
  .tick-chg.down { color: var(--red); }

  /* ── FOOTER ── */
  #footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--footer-h);
    z-index: 100;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 24px;
    background: rgba(0, 16, 32, 0.95);
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    font-size: 10px;
    color: var(--gem-muted);
    opacity: 0;
    transition: opacity 0.5s;
  }
  #footer.visible { opacity: 1; }
  #slide-label { color: var(--gem-label); font-weight: 600; letter-spacing: 0.06em; font-size: 11px; }
  #dots { display: flex; gap: 5px; justify-content: center; }
  .dot {
    width: 20px; height: 3px;
    background: rgba(255, 255, 255, 0.12);
    border-radius: 2px;
    transition: all 0.3s;
  }
  .dot.active {
    background: var(--gem-cyan);
    width: 28px;
  }
  #counter {
    text-align: right;
    font-family: var(--font-money);
    font-variant-numeric: tabular-nums;
    font-size: 11px;
  }

  /* ── STAGE ── */
  #stage {
    position: fixed;
    top: var(--header-h);
    left: 0;
    right: 0;
    bottom: var(--chrome-below);
    height: auto;
    z-index: 1;
    overflow: hidden;
    container-type: size;
    container-name: stage;
  }
  #stage img, #stage video {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 1s ease;
  }
  #stage img.active, #stage video.active { opacity: 1; }

  #progress-wrap {
    position: fixed;
    top: var(--header-h);
    left: 0; right: 0;
    height: 3px;
    z-index: 101;
    background: rgba(0,74,153,0.3);
    opacity: 0;
    transition: opacity 0.3s;
  }
  #progress-wrap.visible { opacity: 1; }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--gem-navy), var(--gem-cyan), var(--gem-cyan-light));
    box-shadow: 0 0 12px var(--gem-cyan-glow);
    transition: width 0.1s linear;
  }

  /* Empty state */
  #empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    text-align: center;
    padding: 40px;
    background: var(--bg);
  }
  .empty-brand {
    padding: 20px 36px;
    border-radius: 10px;
    background: #ffffff;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.35);
  }
  .empty-logo-img {
    height: clamp(72px, 10vw, 110px);
    width: auto;
    max-width: min(460px, 85vw);
    object-fit: contain;
    display: block;
  }
  .empty-board {
    font-size: 13px;
    font-weight: 600;
    color: var(--gem-cyan);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 12px 28px;
    border: 1px solid var(--border-hi);
    border-radius: 4px;
    background: rgba(0,174,239,0.06);
  }
  .empty-sub { font-size: 15px; color: var(--gem-muted); max-width: 440px; line-height: 1.7; }
  .empty-link {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #fff;
    text-decoration: none;
    padding: 12px 28px;
    border-radius: 6px;
    background: linear-gradient(135deg, var(--gem-cyan), var(--gem-navy));
    text-transform: uppercase;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .empty-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px var(--gem-cyan-glow);
  }

  #fullscreen-hint {
    position: fixed;
    top: calc(var(--header-h) + 12px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--gem-muted);
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: rgba(0,24,51,0.9);
    text-transform: uppercase;
    transition: opacity 0.6s;
    pointer-events: none;
  }
  #fullscreen-hint.hidden { opacity: 0; }

  /* 42" TV / 1080p–4K wall display — readable from across the room */
  @media (min-width: 1280px) and (min-height: 720px) {
    :root {
      --ticker-h: 40px;
      --header-h: 58px;
      --footer-h: 34px;
    }
    html { font-size: clamp(15px, 1.25vmin, 20px); }
    .tb-center {
      font-size: clamp(13px, 1.15vw, 16px);
      letter-spacing: 0.16em;
    }
    .tb-center-line { width: 28px; }
    .tb-logo-img { height: 38px; }
    #clock {
      font-size: clamp(13px, 1.1vw, 15px);
      font-weight: 600;
    }
    .live-status { font-size: 12px; }
    .data-updated { font-size: 11px; }
    .ticker-label { font-size: 11px; }
    #ticker-track { font-size: 14px; }
    .tick-item { font-size: 14px; gap: 8px; }
    .tick-sym { font-size: 12px; }
    .tick-val { font-size: 15px; font-weight: 700; }
    #slide-label { font-size: 13px; letter-spacing: 0.08em; }
    #counter { font-size: 13px; }
    #fullscreen-hint { font-size: 13px; padding: 10px 16px; }
  }
  @media (min-width: 1900px) and (min-height: 1000px) {
    :root {
      --ticker-h: 44px;
      --header-h: 64px;
      --footer-h: 36px;
    }
    html { font-size: clamp(16px, 1.35vmin, 22px); }
    .tb-logo-img { height: 42px; }
  }
  @media (max-width: 1100px) {
    .tb-center { display: none; }
  }
</style>
<link rel="icon" href="geminia-mark.png" type="image/png" />
<link rel="stylesheet" href="revenue.css" />
</head>
<body>

  <div id="topbar">
    <div class="tb-left">
      <a class="tb-brand" href="/">
        <div class="tb-logo-pad">
          <img class="tb-logo-img" src="geminia-logo.png" alt="Geminia Life Insurance" />
        </div>
      </a>
    </div>
    <div class="tb-center">
      <span class="tb-center-line" aria-hidden="true"></span>
      Premium Performance
      <span class="tb-center-line" aria-hidden="true"></span>
    </div>
    <div class="tb-right">
      <div class="tb-live-block">
        <div class="live-status">
          <div class="status-dot"></div>
          LIVE
        </div>
        <div id="data-updated" class="data-updated">Connecting…</div>
      </div>
      <div id="clock"></div>
    </div>
  </div>

  <div id="progress-wrap"><div id="progress-bar"></div></div>

  <div id="stage">
    <div id="empty">
      <div class="empty-brand">
        <img class="empty-logo-img" src="geminia-logo.png" alt="Geminia Life Insurance" />
      </div>
      <div class="empty-board">Loading Premium Dashboard</div>
      <div class="empty-sub">Live premium figures from Oracle ERP — exact posted transactions</div>
      <a class="empty-link" href="/admin.html">Open Admin Panel</a>
    </div>
  </div>

  <div id="ticker-wrap">
    <div class="ticker-label">
      <img class="ticker-mark" src="geminia-mark.png" alt="" />
      LIVE PREMIUMS
    </div>
    <div id="ticker-track"></div>
  </div>

  <div id="footer">
    <div id="slide-label">PREMIUM DASHBOARD</div>
    <div id="dots"></div>
    <div id="counter"></div>
  </div>

  <div id="fullscreen-hint">Click for fullscreen</div>

  <script src="display.js"></script>
</body>
</html>
